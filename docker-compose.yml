version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-reservas-mesas
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - BACK4APP_APP_ID=${BACK4APP_APP_ID}
      - BACK4APP_REST_KEY=${BACK4APP_REST_KEY}
      - BACK4APP_MASTER_KEY=${BACK4APP_MASTER_KEY}
      - BACK4APP_URL=https://parseapi.back4app.com
    env_file:
      - .env
    networks:
      - rede-mesas
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Opcional: Adicionar Nginx como reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-mesas
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - rede-mesas
    profiles:
      - production

networks:
  rede-mesas:
    driver: bridge